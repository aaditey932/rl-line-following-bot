<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Line-Following Robot — 3D Replay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #eee; font-family: monospace; overflow: hidden; }
  #canvas-container { position: fixed; inset: 0; }
  #hud {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    background: rgba(0,0,0,0.7); border: 1px solid #333;
    border-radius: 8px; padding: 14px 18px; min-width: 220px;
  }
  #hud h2 { font-size: 13px; color: #aaa; margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
  .stat { display: flex; justify-content: space-between; gap: 24px; font-size: 13px; margin: 4px 0; }
  .stat .label { color: #888; }
  .stat .val { color: #7ef; font-weight: bold; }
  #ir-bar { margin-top: 10px; }
  #ir-bar .title { color: #888; font-size: 11px; margin-bottom: 4px; }
  #ir-cells { display: flex; gap: 4px; }
  .ir-cell {
    width: 28px; height: 28px; border-radius: 4px;
    border: 1px solid #444; display: flex; align-items: center;
    justify-content: center; font-size: 9px; color: #000; font-weight: bold;
  }
  #controls {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; gap: 10px; align-items: center;
    background: rgba(0,0,0,0.7); border: 1px solid #333;
    border-radius: 8px; padding: 10px 18px;
  }
  button {
    background: #222; border: 1px solid #555; color: #eee;
    padding: 6px 14px; border-radius: 5px; cursor: pointer;
    font-family: monospace; font-size: 13px;
  }
  button:hover { background: #333; }
  button.active { background: #1a4a7a; border-color: #4af; }
  #progress-wrap { width: 240px; }
  #progress {
    -webkit-appearance: none; width: 100%; height: 6px;
    border-radius: 3px; background: #333; cursor: pointer; outline: none;
  }
  #progress::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: #7ef; cursor: pointer;
  }
  #speed-label { color: #888; font-size: 12px; white-space: nowrap; }
  #loading {
    position: fixed; inset: 0; background: #111; display: flex;
    align-items: center; justify-content: center; z-index: 100;
    flex-direction: column; gap: 12px;
  }
  #loading p { color: #aaa; font-size: 14px; }
  #drop-hint {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
    color: #555; font-size: 12px; z-index: 10; pointer-events: none;
  }
</style>
</head>
<body>

<div id="loading">
  <p>Loading Three.js…</p>
</div>

<div id="canvas-container"></div>

<div id="hud">
  <h2>Robot Telemetry</h2>
  <div class="stat"><span class="label">Episode return</span><span class="val" id="h-return">—</span></div>
  <div class="stat"><span class="label">Step</span><span class="val" id="h-step">—</span></div>
  <div class="stat"><span class="label">Reward</span><span class="val" id="h-reward">—</span></div>
  <div class="stat"><span class="label">Yaw</span><span class="val" id="h-yaw">—</span></div>
  <div class="stat"><span class="label">Track type</span><span class="val" id="h-track">—</span></div>
  <div id="ir-bar">
    <div class="title">IR Sensors (dark=on line)</div>
    <div id="ir-cells"></div>
  </div>
</div>

<div id="controls">
  <button id="btn-play">&#9654; Play</button>
  <button id="btn-reset">&#8635; Reset</button>
  <div id="progress-wrap">
    <input type="range" id="progress" min="0" max="1" step="1" value="0"/>
  </div>
  <span id="speed-label">Speed: 1×</span>
  <button id="btn-slower">−</button>
  <button id="btn-faster">+</button>
  <button id="btn-cam" class="active">Follow</button>
  <button id="btn-overhead">Top</button>
</div>

<div id="drop-hint">Drop a trajectory JSON file to load a different run</div>

{

    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

// ── Scene setup ────────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.04);

const camera = new THREE.PerspectiveCamera(55, 1, 0.01, 80);
camera.position.set(0, 1.4, -1.2);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.3;
controls.maxDistance = 20;
controls.maxPolarAngle = Math.PI / 2.1;

// Resize
function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

// ── Lighting ────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffffff, 0.45);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff8e7, 1.1);
sun.position.set(3, 6, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far = 30;
sun.shadow.camera.left = sun.shadow.camera.bottom = -8;
sun.shadow.camera.right = sun.shadow.camera.top = 8;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xaaccff, 0.3);
fill.position.set(-4, 3, -3);
scene.add(fill);

// ── Floor ───────────────────────────────────────────────────────────────────
const floorGeo = new THREE.PlaneGeometry(30, 30);
const floorMat = new THREE.MeshStandardMaterial({ color: 0xf5f0e8, roughness: 0.9, metalness: 0.0 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;

// ── Robot mesh ───────────────────────────────────────────────────────────────
const WHEEL_R = 0.033, WHEEL_W = 0.018, BASELINE = 0.14, BODY_L = 0.14, BODY_W = 0.11, BODY_H = 0.04;
const BOT_Z = 0.04; // height above floor

const robotGroup = new THREE.Group();
scene.add(robotGroup);

// Body
const bodyGeo = new THREE.BoxGeometry(BODY_L, BODY_H, BODY_W);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2255bb, roughness: 0.5, metalness: 0.3 });
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.position.y = BOT_Z + BODY_H / 2;
body.castShadow = true;
robotGroup.add(body);

const sbarGeo = new THREE.BoxGeometry(0.015, 0.008, BODY_W * 0.8);

sbar.position.set(BODY_L * 0.5 + 0.008, BOT_Z + 0.005, 0);

];

  const m = new THREE.Mesh(wheelGeo, wheelMat);
  m.rotation.x = Math.PI / 2;
  m.position.set(wx, wy, wz);
  m.castShadow = true;
  robotGroup.add(m);
  return m;
});

// Caster ball
const casterGeo = new THREE.SphereGeometry(0.012, 8, 8);
const casterMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.5, metalness: 0.5 });
const caster = new THREE.Mesh(casterGeo, casterMat);
caster.position.set(-BODY_L * 0.45, 0.012, 0);
robotGroup.add(caster);

// IR sensor dots on front bar
let irDotMeshes = [];
function buildIRDots(n, ySpan) {
  irDotMeshes.forEach(m => robotGroup.remove(m));
  irDotMeshes = [];
  const dotGeo = new THREE.SphereGeometry(0.004, 6, 6);
  for (let i = 0; i < n; i++) {
    const z = n === 1 ? 0 : ySpan * (i / (n - 1) - 0.5);
    const mat = new THREE.MeshStandardMaterial({ color: 0xff2200, emissive: 0xff2200, emissiveIntensity: 0.3 });
    const dot = new THREE.Mesh(dotGeo, mat);
    dot.position.set(BODY_L * 0.5 + 0.018, BOT_Z + 0.002, -z); // note: MuJoCo Y → Three.js -Z
    robotGroup.add(dot);
    irDotMeshes.push(dot);
  }
}

// Heading arrow
const arrowHelper = new THREE.ArrowHelper(
  new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, BOT_Z + BODY_H + 0.02, 0),
  0.12, 0xffee00, 0.04, 0.025
);
robotGroup.add(arrowHelper);

// ── Track & line geometry ─────────────────────────────────────────────────
let trackLine = null, lineMesh = null, trailLine = null;
const trailPositions = [];
const MAX_TRAIL = 600;

function buildTrack(pts2d, lineHalfWidth) {
  if (trackLine) scene.remove(trackLine);
  if (lineMesh) scene.remove(lineMesh);

  // White line strip (thick tube approximation via shape)
  const lw = lineHalfWidth;
  const hw = Math.max(lw, 0.022);
  const shape = new THREE.Shape();
  shape.moveTo(0, -hw);
  shape.lineTo(0, hw);

  // Build ribbon from track points
  if (pts2d.length >= 2) {
    const verts = [];
    for (let i = 0; i < pts2d.length; i++) {
      const [px, py] = pts2d[i];
      // tangent
      const prev = pts2d[Math.max(0, i - 1)];
      const next = pts2d[Math.min(pts2d.length - 1, i + 1)];
      const tx = next[0] - prev[0], ty = next[1] - prev[1];
      const tlen = Math.sqrt(tx*tx + ty*ty) || 1;
      const nx = -ty / tlen, ny = tx / tlen; // perpendicular
      // Two vertices per track point (left/right edges)
      verts.push(new THREE.Vector3(px - nx * hw, 0.0005, -py - ny * hw)); // MuJoCo Y → -Z
      verts.push(new THREE.Vector3(px + nx * hw, 0.0005, -py + ny * hw));
    }
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(verts.length * 3);
    const idx = [];
    for (let i = 0; i < verts.length; i++) {
      pos[i*3] = verts[i].x; pos[i*3+1] = verts[i].y; pos[i*3+2] = verts[i].z;
    }
    for (let i = 0; i < pts2d.length - 1; i++) {
      const b = i * 2;
      idx.push(b, b+1, b+2, b+1, b+3, b+2);
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setIndex(idx);
    geo.computeVertexNormals();
    lineMesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
      color: 0x111111, roughness: 1.0, side: THREE.DoubleSide
    }));
    lineMesh.receiveShadow = true;
    scene.add(lineMesh);
  }

  // Centerline (subtle guide)
  const pts3d = pts2d.map(([px, py]) => new THREE.Vector3(px, 0.001, -py));
  const cGeo = new THREE.BufferGeometry().setFromPoints(pts3d);
  trackLine = new THREE.Line(cGeo, new THREE.LineBasicMaterial({ color: 0x888888, opacity: 0.3, transparent: true }));
  scene.add(trackLine);
}

function buildTrail() {
  if (trailLine) scene.remove(trailLine);
  const pts = trailPositions.map(p => new THREE.Vector3(p[0], BOT_Z + 0.01, -p[1]));
  if (pts.length < 2) return;
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  trailLine = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xff6600, opacity: 0.7, transparent: true }));
  scene.add(trailLine);
}

// ── HUD IR cells ───────────────────────────────────────────────────────────
function buildIRCells(n) {
  const container = document.getElementById('ir-cells');
  container.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const cell = document.createElement('div');
    cell.className = 'ir-cell';
    cell.id = `ir-${i}`;
    container.appendChild(cell);
  }
}

function updateIR(irVals) {
  irVals.forEach((v, i) => {
    const cell = document.getElementById(`ir-${i}`);
    if (!cell) return;
    const dark = 1 - Math.max(0, Math.min(1, v)); // 0=white(off line), 1=dark(on line)
    const g = Math.round(255 * (1 - dark * 0.85));
    cell.style.background = `rgb(${g},${g},${g})`;
    cell.textContent = dark.toFixed(1);
  });
}

// ── State machine ──────────────────────────────────────────────────────────
let traj = null;
let frame = 0;
let playing = false;
let speed = 1;
let cameraMode = 'follow'; // 'follow' | 'overhead' | 'free'
let lastT = 0;
const CONTROL_HZ = 50;

function loadTraj(data) {
  traj = data;
  frame = 0;
  trailPositions.length = 0;
  playing = false;

  buildTrack(data.track_points, data.line_half_width);
  buildIRDots(data.n_ir_sensors, data.ir_sensor_y_span ?? 0.08);
  buildIRCells(data.n_ir_sensors);

  document.getElementById('h-return').textContent = data.return.toFixed(1);
  document.getElementById('h-track').textContent = data.track_type;
  document.getElementById('progress').max = data.frames.length - 1;
  document.getElementById('progress').value = 0;

  // Position camera near robot start
  const f0 = data.frames[0];
  camera.position.set(f0.x, 1.4, -f0.y - 1.2);
  controls.target.set(f0.x, 0, -f0.y);
  controls.update();

  updateFrame(0);
  document.getElementById('loading').style.display = 'none';
}

function updateFrame(idx) {
  if (!traj) return;
  idx = Math.max(0, Math.min(traj.frames.length - 1, idx));
  frame = idx;
  const f = traj.frames[idx];

  // Robot position (MuJoCo X→Three X, MuJoCo Y→Three -Z)
  robotGroup.position.set(f.x, 0, -f.y);
  robotGroup.rotation.y = -f.yaw; // MuJoCo yaw CCW → Three Y rotation

  // Wheel spin (cosmetic, proportional to step)
  wheelMeshes.forEach((w, i) => {
    const sign = i < 2 ? 1 : -1;
    const spd = f.action ? (f.action[i < 2 ? 0 : 1] + 1) * 5 : 0;
    w.rotation.z += sign * spd * 0.05;
  });

  // IR dot colors
  if (f.ir) {
    f.ir.forEach((v, i) => {
      if (irDotMeshes[i]) {
        const dark = 1 - Math.max(0, Math.min(1, v));
        irDotMeshes[i].material.emissiveIntensity = dark * 1.2;
        irDotMeshes[i].material.color.setRGB(dark, dark * 0.1, 0);
      }
    });
    updateIR(f.ir);
  }

  // Trail
  trailPositions.push([f.x, f.y]);
  if (trailPositions.length > MAX_TRAIL) trailPositions.shift();
  buildTrail();

  // HUD
  document.getElementById('h-step').textContent = `${idx + 1} / ${traj.frames.length}`;
  document.getElementById('h-reward').textContent = f.reward.toFixed(3);
  document.getElementById('h-yaw').textContent = (f.yaw * 180 / Math.PI).toFixed(1) + '°';
  document.getElementById('progress').value = idx;
}

// ── Camera follow ──────────────────────────────────────────────────────────
const _camOffset = new THREE.Vector3(-0.6, 0.5, 0);
const _camTarget = new THREE.Vector3();

function updateCamera() {
  if (!traj || cameraMode === 'free') return;
  const f = traj.frames[frame];
  const rx = f.x, rz = -f.y;

  if (cameraMode === 'follow') {
    // Camera behind robot, slightly elevated
    const yaw = -f.yaw;
    const behindX = rx - Math.cos(yaw) * 0.65;
    const behindZ = rz + Math.sin(yaw) * 0.65;
    camera.position.lerp(new THREE.Vector3(behindX, 0.5, behindZ), 0.07);
    _camTarget.set(rx, 0.05, rz);
    controls.target.lerp(_camTarget, 0.1);
  } else if (cameraMode === 'overhead') {
    camera.position.lerp(new THREE.Vector3(rx, 2.8, rz), 0.06);
    _camTarget.set(rx, 0, rz);
    controls.target.lerp(_camTarget, 0.1);
  }
  controls.update();
}

// ── Animation loop ─────────────────────────────────────────────────────────
function animate(t) {
  requestAnimationFrame(animate);
  if (playing && traj) {
    const dt = Math.min((t - lastT) / 1000, 0.1);
    const stepsPerSec = CONTROL_HZ * speed;
    const nextFrame = frame + dt * stepsPerSec;
    const nextIdx = Math.floor(nextFrame);
    if (nextIdx !== frame) updateFrame(nextIdx);
    if (frame >= traj.frames.length - 1) playing = false;
  }
  lastT = t;
  updateCamera();
  if (cameraMode === 'free') controls.update();
  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

// ── Controls ───────────────────────────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click', () => {
  playing = !playing;
  if (playing && frame >= (traj?.frames.length ?? 1) - 1) {
    trailPositions.length = 0;
    updateFrame(0);
  }
  document.getElementById('btn-play').textContent = playing ? '⏸ Pause' : '▶ Play';
});

document.getElementById('btn-reset').addEventListener('click', () => {
  playing = false;
  trailPositions.length = 0;
  updateFrame(0);
  document.getElementById('btn-play').textContent = '▶ Play';
});

document.getElementById('progress').addEventListener('input', e => {
  updateFrame(parseInt(e.target.value));
});

document.getElementById('btn-slower').addEventListener('click', () => {
  speed = Math.max(0.25, speed / 2);
  document.getElementById('speed-label').textContent = `Speed: ${speed}×`;
});

document.getElementById('btn-faster').addEventListener('click', () => {
  speed = Math.min(8, speed * 2);
  document.getElementById('speed-label').textContent = `Speed: ${speed}×`;
});

document.getElementById('btn-cam').addEventListener('click', () => {
  cameraMode = 'follow';
  controls.enabled = false;
  document.getElementById('btn-cam').classList.add('active');
  document.getElementById('btn-overhead').classList.remove('active');
});

document.getElementById('btn-overhead').addEventListener('click', () => {
  cameraMode = 'overhead';
  controls.enabled = false;
  document.getElementById('btn-cam').classList.remove('active');
  document.getElementById('btn-overhead').classList.add('active');
});

// Click canvas to enable free camera
renderer.domElement.addEventListener('pointerdown', () => {
  if (cameraMode !== 'free') {
    cameraMode = 'free';
    controls.enabled = true;
    document.getElementById('btn-cam').classList.remove('active');
    document.getElementById('btn-overhead').classList.remove('active');
  }
});

// ── Drag-and-drop ──────────────────────────────────────────────────────────
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      loadTraj(JSON.parse(ev.target.result));
    } catch (err) { alert('Invalid trajectory JSON: ' + err.message); }
  };
  reader.readAsText(file);
});

// ── Load embedded trajectory ───────────────────────────────────────────────
try {
  const data = JSON.parse(EMBEDDED_TRAJ);
  loadTraj(data);
} catch(e) {
  document.getElementById('loading').innerHTML =
    '<p style="color:#f88">Drop a trajectory JSON file onto this page to load a run.</p>' +
    '<p style="color:#666;font-size:12px;margin-top:8px">Generate with: python evaluate_mujoco.py --save-trajectory traj.json</p>';
}

</script>
</body>
</html>
